[CoreRedirects]

; FJSL4USettings absorbed the old FJSL4UConnectedController and now describes a controller as a whole,
; not just its settings, so it was renamed. Its PlayerNumber field is the controller's player *indicator*
; (the Switch LEDs / the DualSense light bar, set via JslSetPlayerNumber), which reads as an identity next
; to the new DeviceId and PlayerIndex fields -- hence PlayerLedNumber.
+StructRedirects=(OldName="JSL4USettings",NewName="/Script/JoyShockLibrary4Unreal.JSL4UControllerInfo")
+PropertyRedirects=(OldName="JSL4UControllerInfo.PlayerNumber",NewName="JSL4UControllerInfo.PlayerLedNumber")
